        <div class="card" style="width: 100%">

        </div>

        
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#4a90d9", "font": {"color": "white"}, "id": "Cuno", "label": "Cuno", "shape": "dot", "size": 95, "title": "Cuno\n\u0443\u0436\u0435 \u0432\u0441\u0442\u0440\u0435\u0447\u0430\u043b\u0441\u044f \u0440\u0430\u043d\u0435\u0435"}, {"color": "#e8584a", "font": {"color": "white"}, "id": "Insulindian Phasmid", "label": "Insulindian Phasmid", "shape": "dot", "size": 95, "title": "Insulindian Phasmid\n\u043d\u043e\u0432\u044b\u0439 \u043f\u0435\u0440\u0441\u043e\u043d\u0430\u0436"}, {"color": "#4a90d9", "font": {"color": "white"}, "id": "Kim Kitsuragi", "label": "Kim Kitsuragi", "shape": "dot", "size": 95, "title": "Kim Kitsuragi\n\u0443\u0436\u0435 \u0432\u0441\u0442\u0440\u0435\u0447\u0430\u043b\u0441\u044f \u0440\u0430\u043d\u0435\u0435"}, {"color": "#e8584a", "font": {"color": "white"}, "id": "The Deserter", "label": "The Deserter", "shape": "dot", "size": 95, "title": "The Deserter\n\u043d\u043e\u0432\u044b\u0439 \u043f\u0435\u0440\u0441\u043e\u043d\u0430\u0436"}, {"color": "#4a90d9", "font": {"color": "white"}, "id": "You", "label": "You", "shape": "dot", "size": 95, "title": "You\n\u0443\u0436\u0435 \u0432\u0441\u0442\u0440\u0435\u0447\u0430\u043b\u0441\u044f \u0440\u0430\u043d\u0435\u0435"}]);
                  edges = new vis.DataSet([{"from": "Cuno", "to": "Insulindian Phasmid", "width": 2}, {"from": "Cuno", "to": "Kim Kitsuragi", "width": 17}, {"from": "Cuno", "to": "The Deserter", "width": 6}, {"from": "Cuno", "to": "You", "width": 17}, {"from": "Insulindian Phasmid", "to": "Kim Kitsuragi", "width": 2}, {"from": "Insulindian Phasmid", "to": "The Deserter", "width": 2}, {"from": "Insulindian Phasmid", "to": "You", "width": 2}, {"from": "Kim Kitsuragi", "to": "The Deserter", "width": 6}, {"from": "Kim Kitsuragi", "to": "You", "width": 17}, {"from": "The Deserter", "to": "You", "width": 6}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
